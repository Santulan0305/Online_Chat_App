<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #0d0f1a;
            --bg-panel: #13162a;
            --bg-card: #1a1e35;
            --bg-hover: #222748;
            --accent: #7c6af7;
            --accent-glow: rgba(124, 106, 247, 0.35);
            --accent2: #f76a8c;
            --accent2-glow: rgba(247, 106, 140, 0.25);
            --teal: #4ecdc4;
            --text-primary: #eef0ff;
            --text-secondary: #8890b5;
            --text-muted: #555e80;
            --msg-sent: #7c6af7;
            --msg-recv: #1f2442;
            --border: rgba(255,255,255,0.07);
            --radius: 18px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-deep);
            font-family: 'DM Sans', sans-serif;
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(124,106,247,0.12) 0%, transparent 70%);
            top: -150px; left: -100px;
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(247,106,140,0.08) 0%, transparent 70%);
            bottom: -100px; right: -100px;
            pointer-events: none;
            z-index: 0;
        }

        .navbar-prime {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 60px;
            background: rgba(13,15,26,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            z-index: 1000;
        }

        .brand {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.35rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--accent), var(--teal));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-dot {
            width: 8px; height: 8px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
            animation: pulse-dot 2s ease infinite;
            -webkit-text-fill-color: unset;
        }

        @keyframes pulse-dot {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.6; }
        }

        .nav-logout {
            background: rgba(247,106,140,0.1);
            border: 1px solid rgba(247,106,140,0.3);
            color: var(--accent2);
            padding: 7px 18px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }
        .nav-logout:hover {
            background: var(--accent2);
            color: white;
            box-shadow: 0 0 20px var(--accent2-glow);
        }

        .app-shell {
            position: relative;
            z-index: 1;
            display: flex;
            height: 100vh;
            padding-top: 60px;
        }

        .sidebar {
            width: 300px;
            min-width: 300px;
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
        }

        .sidebar-header {
            padding: 0 20px 16px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h4 {
            font-family: 'Syne', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .online-count {
            font-size: 0.82rem;
            color: var(--teal);
            font-weight: 500;
        }

        .online-count::before {
            content: '';
            display: inline-block;
            width: 6px; height: 6px;
            background: var(--teal);
            border-radius: 50%;
            margin-right: 6px;
            box-shadow: 0 0 6px var(--teal);
        }

        #connectedUsers {
            flex: 1;
            overflow-y: auto;
            padding: 12px 12px;
            list-style: none;
        }

        #connectedUsers::-webkit-scrollbar { width: 3px; }
        #connectedUsers::-webkit-scrollbar-track { background: transparent; }
        #connectedUsers::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 10px; }

        .user-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 14px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 4px;
            position: relative;
        }

        .user-item:hover { background: var(--bg-hover); }

        .user-item.active {
            background: linear-gradient(135deg, rgba(124,106,247,0.25), rgba(78,205,196,0.1));
            box-shadow: 0 0 0 1px rgba(124,106,247,0.3);
        }

        .user-avatar {
            width: 42px; height: 42px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--accent), var(--teal));
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1rem;
            color: white;
            flex-shrink: 0;
            position: relative;
        }

        .user-avatar .status-dot {
            position: absolute;
            bottom: -2px; right: -2px;
            width: 11px; height: 11px;
            background: var(--teal);
            border-radius: 50%;
            border: 2px solid var(--bg-panel);
            box-shadow: 0 0 6px var(--teal);
        }

        .user-info { flex: 1; min-width: 0; }
        .user-name {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .user-status { font-size: 0.72rem; color: var(--teal); margin-top: 1px; }

        .notify-badge {
            background: var(--accent2);
            color: white;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 50px;
            display: none;
            box-shadow: 0 0 10px var(--accent2-glow);
            animation: badge-pop 0.3s ease;
        }

        @keyframes badge-pop {
            0% { transform: scale(0); }
            80% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .current-user-tag {
            padding: 14px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: auto;
        }

        .current-avatar {
            width: 38px; height: 38px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 0.95rem;
            color: white;
        }

        .current-label { font-size: 0.72rem; color: var(--text-muted); }
        .current-name { font-weight: 600; font-size: 0.88rem; color: var(--text-primary); }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-deep);
            position: relative;
        }

        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-panel);
            display: flex;
            align-items: center;
            gap: 14px;
            min-height: 68px;
        }

        .chat-header-avatar {
            width: 40px; height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), var(--teal));
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            color: white;
        }

        .chat-header-info h5 {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-primary);
            margin: 0;
        }

        .chat-header-info span { font-size: 0.75rem; color: var(--teal); }

        .empty-chat-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            color: var(--text-muted);
            padding: 40px;
        }

        .empty-icon {
            width: 80px; height: 80px;
            border-radius: 24px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .empty-chat-state h3 {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--text-secondary);
        }

        .empty-chat-state p {
            font-size: 0.88rem;
            text-align: center;
            max-width: 260px;
            line-height: 1.6;
        }

        #chat-messages {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #chat-messages::-webkit-scrollbar { width: 3px; }
        #chat-messages::-webkit-scrollbar-track { background: transparent; }
        #chat-messages::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 10px; }

        .message {
            max-width: 55%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.9rem;
            line-height: 1.55;
            word-wrap: break-word;
            white-space: pre-wrap;
            animation: msg-in 0.25s ease;
            position: relative;
        }

        @keyframes msg-in {
            from { opacity: 0; transform: translateY(8px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .message.sender {
            background: var(--accent);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
            box-shadow: 0 4px 20px rgba(124,106,247,0.3);
        }

        .message.receiver {
            background: var(--msg-recv);
            color: var(--text-primary);
            align-self: flex-start;
            border-bottom-left-radius: 5px;
            border: 1px solid var(--border);
        }

        .input-zone {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            background: var(--bg-panel);
        }

        #messageForm {
            display: none;
            align-items: center;
            gap: 12px;
        }

        .input-wrapper { flex: 1; position: relative; }

        #message {
            width: 100%;
            background: var(--bg-deep);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px 18px;
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s;
        }

        #message::placeholder { color: var(--text-muted); }

        #message:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .send-btn {
            width: 48px; height: 48px;
            border-radius: 14px;
            background: var(--accent);
            border: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            font-size: 1rem;
            box-shadow: 0 4px 14px rgba(124,106,247,0.4);
        }

        .send-btn:hover {
            background: #6a58e6;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(124,106,247,0.5);
        }

        .send-btn:active { transform: scale(0.95); }

        .chat-header.empty { display: none; }
    </style>
</head>
<body>

<nav class="navbar-prime">
    <div class="brand">
        <div class="brand-dot"></div>
        Prime Chat
    </div>
    <a href="/logout" id="logout" class="nav-logout">
        <i class="fas fa-right-from-bracket" style="font-size:14px;"></i>
        Sign Out
    </a>
</nav>

<div class="app-shell">
    <aside class="sidebar">
        <div class="sidebar-header">
            <h4>Conversations</h4>
            <span class="online-count" id="online-count-label">Loading users...</span>
        </div>
        <ul id="connectedUsers"></ul>
        <div class="current-user-tag">
            <div class="current-avatar" id="my-avatar">?</div>
            <div>
                <div class="current-label">You are</div>
                <div class="current-name" id="connected-user-fullname">—</div>
            </div>
        </div>
    </aside>

    <main class="chat-area">
        <div class="chat-header empty" id="chat-header">
            <div class="chat-header-avatar" id="chat-header-avatar">?</div>
            <div class="chat-header-info">
                <h5 id="chat-header-name">Username</h5>
                <span>Online now</span>
            </div>
        </div>

        <div class="empty-chat-state" id="empty-state">
            <div class="empty-icon">💬</div>
            <h3>Start a conversation</h3>
            <p>Select someone from the list on the left to open a chat.</p>
        </div>

        <div id="chat-messages" style="display:none;"></div>

        <div class="input-zone" id="input-zone" style="display:none;">
            <form id="messageForm">
                <div class="input-wrapper">
                    <input type="text" id="message" placeholder="Type a message…" autocomplete="off">
                </div>
                <button type="submit" class="send-btn" title="Send">
                    <i class="fas fa-paper-plane" style="font-size:15px;"></i>
                </button>
            </form>
        </div>
    </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.1.4/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script>
    const messageForm = document.querySelector('#messageForm');
    const messageInput = document.querySelector('#message');
    const chatArea = document.querySelector('#chat-messages');
    const logout = document.querySelector('#logout');
    const emptyState = document.getElementById('empty-state');
    const chatHeader = document.getElementById('chat-header');
    const inputZone = document.getElementById('input-zone');

    let selectedUserId = null;
    let stompClient = null;
    const username = '[[${username}]]';
    const notificationState = {};

    function getInitials(name) {
        return name ? name.charAt(0).toUpperCase() : '?';
    }

    function connect() {
        const socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);
        stompClient.debug = () => {};
        stompClient.connect({}, onConnected);
    }

    function onConnected() {
        stompClient.subscribe(`/user/${username}/queue/messages`, onMessageReceived);
        stompClient.subscribe(`/user/public`, onMessageReceived);
        stompClient.send("/app/user.addUser", {}, JSON.stringify({ username, status: 'ONLINE' }));
        document.querySelector('#connected-user-fullname').textContent = username;
        document.getElementById('my-avatar').textContent = getInitials(username);
        findAndDisplayConnectedUsers();
    }

    async function findAndDisplayConnectedUsers() {
        const res = await fetch('/users');
        let users = await res.json();
        users = users.filter(u => u.username !== username);
        const list = document.getElementById('connectedUsers');
        list.innerHTML = '';
        const label = document.getElementById('online-count-label');
        label.textContent = users.length === 0 ? 'No one online' : `${users.length} online`;
        users.forEach(user => appendUserElement(user, list));
    }

    function appendUserElement(user, list) {
        const li = document.createElement('li');
        li.classList.add('user-item');
        li.id = user.username;
        const badgeVisible = notificationState[user.username] ? 'inline-block' : 'none';
        const initials = getInitials(user.username);
        li.innerHTML = `
            <div class="user-avatar">
                ${initials}
                <div class="status-dot"></div>
            </div>
            <div class="user-info">
                <div class="user-name">${user.username}</div>
                <div class="user-status">Online</div>
            </div>
            <span class="notify-badge" id="notify-${user.username}" style="display:${badgeVisible};">New</span>
        `;
        li.addEventListener('click', userItemClick);
        list.appendChild(li);
    }

    function userItemClick(event) {
        document.querySelectorAll('.user-item').forEach(i => i.classList.remove('active'));
        const clicked = event.currentTarget;
        clicked.classList.add('active');
        selectedUserId = clicked.id;

        emptyState.style.display = 'none';
        chatArea.style.display = 'flex';
        inputZone.style.display = 'block';
        chatHeader.classList.remove('empty');
        messageForm.style.display = 'flex';

        document.getElementById('chat-header-name').textContent = selectedUserId;
        document.getElementById('chat-header-avatar').textContent = getInitials(selectedUserId);

        const badge = document.getElementById(`notify-${selectedUserId}`);
        if (badge) badge.style.display = 'none';
        delete notificationState[selectedUserId];

        fetchAndDisplayUserChat();
    }

    async function fetchAndDisplayUserChat() {
        const res = await fetch(`/messages/${username}/${selectedUserId}`);
        const msgs = await res.json();
        chatArea.innerHTML = '';
        msgs.forEach(chat => displayMessage(chat.senderId, chat.content));
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function displayMessage(senderId, content) {
        const div = document.createElement('div');
        div.classList.add('message', senderId === username ? 'sender' : 'receiver');
        div.textContent = content;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function sendMessage(event) {
        event.preventDefault();
        const content = messageInput.value.trim();
        if (content && stompClient) {
            stompClient.send("/app/chat", {}, JSON.stringify({
                senderId: username,
                receiverId: selectedUserId,
                content,
                timestamp: new Date()
            }));
            displayMessage(username, content);
            messageInput.value = '';
            chatArea.scrollTop = chatArea.scrollHeight;
        }
    }

    function onMessageReceived(payload) {
        const message = JSON.parse(payload.body);
        notificationState[message.senderId] = true;
        findAndDisplayConnectedUsers().then(() => {
            Object.keys(notificationState).forEach(uid => {
                if (notificationState[uid]) {
                    const badge = document.getElementById(`notify-${uid}`);
                    if (badge) badge.style.display = 'inline-block';
                }
            });
        });
        if (selectedUserId && selectedUserId === message.senderId) {
            displayMessage(message.senderId, message.content);
            delete notificationState[message.senderId];
        }
    }

    function onLogout() {
        stompClient.send("/app/user.disconnectUser", {}, JSON.stringify({ username, status: 'OFFLINE' }));
        window.location.reload();
    }

    messageForm.addEventListener('submit', sendMessage);
    logout.addEventListener('click', onLogout);
    connect();
</script>
</body>
</html>
